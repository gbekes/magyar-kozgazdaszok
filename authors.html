<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authors — Evidence for Hungary</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="container">
      <h1>Authors</h1>
      <p class="muted">Hungarian economists with at least one publication in a top general or top field journal. Diaspora included.</p>

      <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap; margin-bottom:1.2rem;">
        <div class="search-bar" style="max-width:440px; flex:1;">
          <input id="author-search" type="search" placeholder="Filter by name, field, affiliation…" autocomplete="off">
        </div>
        <label class="small">Field:
          <select id="field-filter">
            <option value="">All fields</option>
          </select>
        </label>
        <label class="small">Sort:
          <select id="sort-order">
            <option value="name">Name A–Z</option>
            <option value="papers">Paper count (desc)</option>
          </select>
        </label>
      </div>

      <div id="author-grid" class="author-grid"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/app.js"></script>
  <script src="assets/chrome.js"></script>
  <script>
  (async function () {
    const EFH = window.EFH;
    const data = await EFH.loadData();

    // populate field filter
    const fieldSel = document.getElementById('field-filter');
    data.topics.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id; opt.textContent = t.name_en;
      fieldSel.appendChild(opt);
    });

    function render() {
      const q = document.getElementById('author-search').value.trim().toLowerCase();
      const field = document.getElementById('field-filter').value;
      const sort = document.getElementById('sort-order').value;

      let list = data.authors.filter(a => {
        if (field && !(a.primary_fields || []).includes(field)) return false;
        if (!q) return true;
        const hay = [
          a.name_en, a.name_hu,
          (a.affiliations || []).map(x => x.name).join(' '),
          a.bio_en
        ].filter(Boolean).join(' ').toLowerCase();
        return hay.includes(q);
      });

      function surname(name) {
        const tokens = (name || '').trim().split(/\s+/);
        return tokens[tokens.length - 1] || '';
      }
      function givenNames(name) {
        const tokens = (name || '').trim().split(/\s+/);
        return tokens.slice(0, -1).join(' ');
      }

      list.sort((a, b) => {
        if (sort === 'papers') return (b.paper_count || 0) - (a.paper_count || 0);
        return surname(a.name_en).localeCompare(surname(b.name_en), 'en');
      });

      const grid = document.getElementById('author-grid');
      grid.innerHTML = list.length ? list.map(a => {
        const affil = (a.affiliations || [])[0]?.name || '';
        const fields = (a.primary_fields || []).map(f =>
          `<span class="tag">${EFH.esc(data.topicsById[f]?.name_en || f)}</span>`
        ).join(' ');
        const cb = [];
        if (a.paper_count) cb.push(`${a.paper_count} paper${a.paper_count === 1 ? '' : 's'}`);
        if (a.policy_count) cb.push(`${a.policy_count} policy`);
        if (a.press_count) cb.push(`${a.press_count} press`);
        const count = cb.length ? `<span class="muted small">${cb.join(' · ')}</span>` : '';
        // Display "Surname, Given names" — academic convention, and makes the sort order obvious.
        const sn = surname(a.name_en), gn = givenNames(a.name_en);
        const display = gn ? `${sn}, ${gn}` : sn;
        const dagger = a.deceased ? ` <span class="deceased-note" title="deceased${a.died ? ' ' + a.died : ''}">†</span>` : '';
        const photo = a.photo_url
          ? `<img class="author-photo" src="${EFH.esc(a.photo_url)}" alt="" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="author-photo author-photo-placeholder" aria-hidden="true">${EFH.esc(sn[0] || '·').toUpperCase()}</div>`;
        return `
          <article class="author-card ${a.photo_url ? 'has-photo' : ''}">
            ${photo}
            <div class="author-card-body">
              <h3><a href="author.html?id=${encodeURIComponent(a.id)}">${EFH.esc(display)}</a>${dagger} ${count}</h3>
              <div class="affil">${EFH.esc(affil)}</div>
              <div class="fields">${fields}</div>
            </div>
          </article>
        `;
      }).join('') : '<p class="muted">No authors match.</p>';
    }

    document.getElementById('author-search').addEventListener('input', render);
    document.getElementById('field-filter').addEventListener('change', render);
    document.getElementById('sort-order').addEventListener('change', render);
    render();
  })();
  </script>
</body>
</html>
