<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Szerző — Magyar Közgazdászok</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="container">
      <p class="small muted"><a href="authors.html">← Minden szerző</a></p>
      <div id="author-root">Betöltés…</div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/app.js"></script>
  <script src="../assets/chrome.js"></script>
  <script>
  (async function () {
    const EFH = window.EFH;
    const data = await EFH.loadData();
    const id = EFH.getParam('id');
    const a = data.authorsById[id];
    const root = document.getElementById('author-root');
    if (!a) {
      root.innerHTML = `<h1>Nincs ilyen szerző</h1><p class="muted">Nem található <code>${EFH.esc(id || '')}</code> azonosítóval.</p>`;
      return;
    }
    const displayName = a.name_hu || a.name_en;
    document.title = `${displayName} — Magyar Közgazdászok`;

    const affils = (a.affiliations || []).map(x => {
      const name = x.name_hu || x.name;
      const role = x.role_hu || x.role;
      const roleStr = role ? `, ${role}` : '';
      const since = x.start ? ` (${x.start}-tól)` : '';
      return `<li>${EFH.esc(name + roleStr)}${since}</li>`;
    }).join('');

    const fields = (a.primary_fields || []).map(f =>
      `<a class="tag" href="topic.html?id=${encodeURIComponent(f)}">${EFH.esc(data.topicsById[f]?.name_hu || data.topicsById[f]?.name_en || f)}</a>`
    ).join(' ');

    const links = [];
    if (a.website) links.push(`<a href="${EFH.esc(a.website)}" target="_blank" rel="noopener">Honlap</a>`);
    if (a.scholar_id) links.push(`<a href="https://scholar.google.com/citations?user=${EFH.esc(a.scholar_id)}" target="_blank" rel="noopener">Google Scholar</a>`);
    if (a.repec_id) links.push(`<a href="https://ideas.repec.org/e/${EFH.esc(a.repec_id)}.html" target="_blank" rel="noopener">RePEc</a>`);
    if (a.orcid) links.push(`<a href="https://orcid.org/${EFH.esc(a.orcid)}" target="_blank" rel="noopener">ORCID</a>`);
    // Az e-mail címet szándékosan nem jelenítjük meg. A szerkesztői megkeresés céljára külön gyűjtjük.

    const papers = data.papers
      .filter(p => (p.authors || []).includes(a.id))
      .sort((x, y) => (y.year || 0) - (x.year || 0));
    const byYear = {};
    for (const p of papers) (byYear[p.year || 'datálatlan'] ||= []).push(p);
    const years = Object.keys(byYear).sort((a, b) => b.localeCompare(a));

    const policyItems = (data.policy || [])
      .filter(p => (p.authors || []).includes(a.id))
      .sort((x, y) => (y.year || 0) - (x.year || 0));
    const pressItems = (data.press || [])
      .filter(p => (p.authors || []).includes(a.id))
      .sort((x, y) => (y.date || y.year || '').localeCompare?.(x.date || x.year || '') || 0);

    const reviewBanner = a.review_status === 'needs-verification' || a.review_status === 'stub'
      ? `<div class="banner-review">Profil állapota: <strong>${EFH.esc(a.review_status)}</strong> — részletek ellenőrzésre várnak.</div>`
      : '';

    const bio = a.bio_hu || a.bio_en;
    const bioNote = (!a.bio_hu && a.bio_en) ? '<p class="small muted"><em>Magyar életrajz hamarosan.</em></p>' : '';

    const deceasedNote = a.deceased
      ? `<span class="deceased-note" title="elhunyt">† ${a.died ? EFH.esc(String(a.died)) : ''}</span>`
      : '';

    const mediaEnOn = !!a.open_to_media_en;
    const mediaHuOn = !!a.open_to_media_hu;
    const mediaNote = (mediaEnOn || mediaHuOn) && a.media_note
      ? `<p class="small muted" style="margin:0.3rem 0 0;">${EFH.esc(a.media_note)}</p>` : '';
    const mediaBlock = `
      <div class="media-row">
        <span class="media-label">Média-felkérésekre nyitott:</span>
        <span class="media-pill media-en ${mediaEnOn ? 'on' : 'off'}" title="angol nyelven">EN</span>
        <span class="media-pill media-hu ${mediaHuOn ? 'on' : 'off'}" title="magyar nyelven">HU</span>
      </div>
      ${mediaNote}`;

    const photoBlock = a.photo_url
      ? `<img class="entity-photo" src="${EFH.esc(a.photo_url)}" alt="" onerror="this.style.display='none'">`
      : '';
    root.innerHTML = `
      <header class="entity-header ${a.photo_url ? 'has-photo' : ''}">
        ${photoBlock}
        <div>
        <h1>${EFH.esc(displayName)} ${deceasedNote}</h1>
        ${a.name_en && a.name_en !== displayName ? `<div class="sub">${EFH.esc(a.name_en)}</div>` : ''}
        ${reviewBanner}
        ${bio ? `<p class="bio">${EFH.esc(bio)}</p>` : ''}
        ${bioNote}
        ${fields ? `<div style="margin-top:0.5rem;">${fields}</div>` : ''}
        </div>
      </header>

      <div class="layout-filter">
        <aside class="filter-sidebar">
          ${affils ? `<h3 style="margin-top:0;">Affiliációk</h3><ul style="padding-left:1rem; margin:0.3rem 0;">${affils}</ul>` : ''}
          ${links.length ? `<h3>Linkek</h3><ul class="link-list" style="margin:0;">${links.map(l => `<li>${l}</li>`).join('')}</ul>` : ''}
          ${mediaBlock}
        </aside>
        <section>
          <div class="entity-counts">
            <a class="count-chip" href="#sec-research">${papers.length} <span class="lbl">tanulmány</span></a>
            ${policyItems.length ? `<a class="count-chip count-policy" href="#sec-policy">${policyItems.length} <span class="lbl">szakpolitikai</span></a>` : ''}
            ${pressItems.length ? `<a class="count-chip count-press" href="#sec-press">${pressItems.length} <span class="lbl">sajtó</span></a>` : ''}
          </div>
          <h2 class="entity-section-h" id="sec-research">Kutatás</h2>
          <div class="result-head">
            <span class="count">${papers.length} tanulmány</span>
          </div>
          ${papers.length ? years.map(y => `
            <div class="paper-year-group">
              <h3>${EFH.esc(y)}</h3>
              ${byYear[y].map(p => EFH.paperCardHtml(data, p, 'hu')).join('')}
            </div>
          `).join('') : '<p class="muted">Ehhez a szerzőhöz még nem tartozik tanulmány. Fokozatosan adjuk hozzá őket; nézz vissza később.</p>'}

          ${policyItems.length ? `
            <h2 class="entity-section-h" id="sec-policy">Szakpolitikai munkák</h2>
            <div class="result-head">
              <span class="count">${policyItems.length} tétel</span>
            </div>
            <div>${policyItems.map(p => EFH.policyCardHtml(data, p, 'hu')).join('')}</div>
          ` : ''}

          ${pressItems.length ? `
            <h2 class="entity-section-h" id="sec-press">Sajtó &amp; publicisztika</h2>
            <div class="result-head">
              <span class="count">${pressItems.length} tétel</span>
            </div>
            <ul class="press-list">${pressItems.map(p => EFH.pressLineHtml(data, p, 'hu')).join('')}</ul>
          ` : ''}
        </section>
      </div>
    `;
  })();
  </script>
</body>
</html>
