<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Téma — Magyar Közgazdászok</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="container">
      <p class="small muted"><a href="topics.html">← Minden téma</a></p>
      <div id="topic-root">Betöltés…</div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/app.js"></script>
  <script src="../assets/chrome.js"></script>
  <script>
  (async function () {
    const EFH = window.EFH;
    const data = await EFH.loadData();
    const id = EFH.getParam('id');
    const t = data.topicsById[id];
    const root = document.getElementById('topic-root');
    if (!t) {
      root.innerHTML = `<h1>Nincs ilyen téma</h1><p class="muted">Nem található <code>${EFH.esc(id || '')}</code> azonosítóval.</p>`;
      return;
    }
    const displayName = t.name_hu || t.name_en;
    document.title = `${displayName} — Magyar Közgazdászok`;

    const dataTypeLabelsHu = {
      'admin-firm':'Adminisztratív vállalati','admin-tax':'Adminisztratív adó','admin-individual':'Adminisztratív egyéni',
      'survey':'Felmérés','firm-level-dataset':'Kereskedelmi vállalati adat','field-experiment':'Terepkísérlet',
      'macro-aggregate':'Makro / aggregált','digital-trace':'Digitális lábnyom','historical':'Történeti / levéltári'
    };
    const methodLabelsHu = {
      'rct':'Randomizált kísérlet','diff-in-diff':'Különbség a különbségben','iv':'Instrumentumváltozó',
      'rd':'Regressziós diszkontinuitás','panel-data':'Paneladat / fix hatások','synthetic-control':'Szintetikus kontroll',
      'structural':'Strukturális modell','theory':'Elmélet','time-series':'Idősor / VAR',
      'ml-text':'Gépi tanulás / szövegelemzés','descriptive-survey':'Leíró / felmérés-alapú'
    };

    const papers = data.papers
      .filter(p => (p.topics || []).includes(id))
      .sort((a, b) => (b.year || 0) - (a.year || 0));

    const dataCounts = {}, methodCounts = {};
    for (const p of papers) {
      for (const d of (p.data_types || [])) dataCounts[d] = (dataCounts[d] || 0) + 1;
      for (const m of (p.methods || [])) methodCounts[m] = (methodCounts[m] || 0) + 1;
    }
    const dataLandscape = Object.entries(dataCounts).sort((a, b) => b[1] - a[1]);
    const methodLandscape = Object.entries(methodCounts).sort((a, b) => b[1] - a[1]);

    const related = {};
    for (const p of papers) {
      for (const tt of (p.topics || [])) if (tt !== id) related[tt] = (related[tt] || 0) + 1;
    }
    const relatedList = Object.entries(related).sort((a, b) => b[1] - a[1]).slice(0, 6);

    root.innerHTML = `
      <header class="entity-header">
        <h1>${EFH.esc(displayName)}</h1>
        <div class="sub">${EFH.esc(t.name_en || '')}</div>
        <p class="bio">${EFH.esc(t.description_hu || t.description_en)}</p>
        <p class="small"><strong>Szakpolitikai keretezés:</strong> ${EFH.esc(t.policy_framing_hu || t.policy_framing_en || '')}</p>
      </header>

      <div class="layout-filter">
        <aside class="filter-sidebar">
          <h3 style="margin-top:0;">Adattípusok</h3>
          ${dataLandscape.length ? dataLandscape.map(([d, c]) => `
            <div class="small" style="display:flex; justify-content:space-between;">
              <span>${EFH.esc(dataTypeLabelsHu[d] || EFH.dataTypeLabel(d))}</span>
              <span class="muted">${c}</span>
            </div>
          `).join('') : '<p class="muted small">Még nincs adat.</p>'}

          <h3>Módszerek</h3>
          ${methodLandscape.length ? methodLandscape.map(([m, c]) => `
            <div class="small" style="display:flex; justify-content:space-between;">
              <span>${EFH.esc(methodLabelsHu[m] || EFH.methodLabel(m))}</span>
              <span class="muted">${c}</span>
            </div>
          `).join('') : '<p class="muted small">—</p>'}

          <h3>Kapcsolódó témák</h3>
          ${relatedList.length ? relatedList.map(([rid, c]) =>
            `<div class="small"><a href="topic.html?id=${encodeURIComponent(rid)}">${EFH.esc(data.topicsById[rid]?.name_hu || data.topicsById[rid]?.name_en)}</a> <span class="muted">(${c})</span></div>`
          ).join('') : '<p class="muted small">—</p>'}
        </aside>

        <section>
          <div class="result-head">
            <span class="count">${papers.length} tanulmány</span>
            <a class="small" href="papers.html?topic=${encodeURIComponent(id)}">Teljes szűrőnézetben megnyitás →</a>
          </div>
          ${papers.length ? papers.map(p => EFH.paperCardHtml(data, p, 'hu')).join('') : '<p class="muted">Ehhez a témához még nincs címkézett tanulmány.</p>'}
        </section>
      </div>
    `;
  })();
  </script>
</body>
</html>
